<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#111827" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <title>ArchiLog - 현장관리 시스템</title>
  </head>
  <body class="antialiased">
    <div id="root">
      <div style="height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; font-family: sans-serif; background-color: #f3f4f6;">
        <h1 style="font-weight: 900; letter-spacing: -0.05em; margin-bottom: 0.5rem; font-style: italic; font-size: 2.5rem; color: #111827;">ArchiLog</h1>
        <div style="width: 40px; height: 40px; border: 4px solid #e5e7eb; border-top-color: #2563eb; border-radius: 50%; animate: spin 1s linear infinite;"></div>
        <p style="font-weight: 700; font-size: 0.75rem; color: #6b7280; text-transform: uppercase; letter-spacing: 0.2em; margin-top: 2rem;">Initiating System</p>
      </div>
      <style>
        @keyframes spin { to { transform: rotate(360deg); } }
      </style>
    </div>
    <script type="module" src="src/main.tsx"></script>
  </body>
</html>
