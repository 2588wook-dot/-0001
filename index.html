<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ArchiLog - 현장관리 시스템</title>
    <script>
      // Early error tracking
      window.onerror = function(msg, url, line, col, error) {
        console.error("Early Load Error:", msg, "at", url, line, col);
        var root = document.getElementById('root');
        if (root) {
          root.innerHTML = '<div style="padding: 20px; color: red;"><h1>System Error</h1><p>' + msg + '</p></div>';
        }
        return false;
      };
      console.log("ArchiLog: index.html loaded, waiting for main.tsx...");
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="src/main.tsx"></script>
  </body>
</html>
